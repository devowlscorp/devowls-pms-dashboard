<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevOwls PMS Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3248;
      --text: #e2e8f0;
      --muted: #64748b;
      --done: #22c55e;
      --doing: #f59e0b;
      --todo: #475569;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    header span { font-size: 0.8rem; color: var(--muted); }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: #4a5180; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 1.25rem 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .card-header h2 {
      font-size: 0.95rem;
      font-weight: 600;
      flex: 1;
    }
    .pct {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
    }

    .progress-bar {
      height: 4px;
      background: var(--border);
    }
    .progress-fill {
      height: 100%;
      transition: width 0.4s ease;
    }

    .card-body { padding: 0.875rem 1.25rem; }

    .epics {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 0.875rem;
    }
    .epic-card {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      background: var(--surface2);
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .epic-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.72rem;
    }
    .epic-name {
      color: var(--text);
      font-weight: 500;
    }
    .epic-pct {
      font-weight: 700;
      font-size: 0.7rem;
      color: var(--muted);
    }
    .epic-progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 1.5px;
      overflow: hidden;
    }
    .epic-progress-fill {
      height: 100%;
      transition: width 0.4s ease;
    }

    /* Phase styles */
    .phases-container {
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }
    .phases-title {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }
    .phases-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      padding: 0 0.25rem;
      margin-bottom: 0.875rem;
    }
    .phase-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      position: relative;
      z-index: 1;
    }
    .phase-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border);
      border: 2px solid var(--surface);
      transition: all 0.3s ease;
    }
    .phase-label {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--muted);
      transition: color 0.3s ease;
    }
    .phase-step.completed .phase-dot {
      background: var(--done);
      box-shadow: 0 0 6px rgba(34, 197, 94, 0.3);
    }
    .phase-step.completed .phase-label {
      color: var(--done);
    }
    .phase-step.active .phase-dot {
      background: var(--doing);
      box-shadow: 0 0 6px rgba(245, 158, 11, 0.4);
      transform: scale(1.15);
    }
    .phase-step.active .phase-label {
      color: var(--doing);
      font-weight: 700;
    }
    .phase-connector {
      flex: 1;
      height: 2px;
      background: var(--border);
      margin: 0 -4px;
      position: relative;
      top: 6px;
      z-index: 0;
      transition: background 0.3s ease;
    }
    .phase-connector.completed {
      background: var(--done);
    }
    .phase-connector.active {
      background: linear-gradient(to right, var(--done), var(--doing));
    }

    .phase-progress-section {
      margin-top: 0.6rem;
    }
    .phase-progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      color: var(--muted);
      margin-bottom: 0.3rem;
    }
    .phase-progress-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .phase-progress-fill {
      height: 100%;
      transition: width 0.4s ease;
    }

    .badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .badge-done  { background: #14532d; color: var(--done); }
    .badge-doing { background: #451a03; color: var(--doing); }
    .badge-todo  { background: var(--surface2); color: var(--muted); }

    .tasks-section { border-top: 1px solid var(--border); padding-top: 0.75rem; }
    .tasks-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }
    .task-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      padding: 0.2rem 0;
      color: var(--text);
    }
    .task-row .task-id { color: var(--muted); font-size: 0.72rem; flex-shrink: 0; }
    .task-row .task-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .card-footer {
      padding: 0.5rem 1.25rem 0.75rem;
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }
    .card-footer a { color: var(--muted); text-decoration: none; }
    .card-footer a:hover { color: var(--text); }

    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .error-msg {
      background: #1e0a0a;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      color: #fca5a5;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>DevOwls PMS</h1>
    <span id="last-updated"></span>
  </header>
  <div id="grid"><div class="loading">Loading projects...</div></div>

  <script>
    const REGISTRY = 'registry.json';

    function statusBadge(s) {
      const cls = s === 'DONE' ? 'badge-done' : s === 'DOING' ? 'badge-doing' : 'badge-todo';
      const label = s === 'DONE' ? '✓ done' : s === 'DOING' ? '⚡ doing' : '○ todo';
      return `<span class="badge ${cls}">${label}</span>`;
    }

    function taskBadge(s) {
      const cls = s === 'DONE' ? 'badge-done' : s === 'CLAIMED' || s === 'DOING' ? 'badge-doing' : 'badge-todo';
      return `<span class="badge ${cls}">${s}</span>`;
    }

    function relativeTime(iso) {
      const diff = Date.now() - new Date(iso).getTime();
      const m = Math.floor(diff / 60000);
      if (m < 1) return '방금';
      if (m < 60) return `${m}분 전`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}시간 전`;
      return `${Math.floor(h / 24)}일 전`;
    }

    function renderCard(status) {
      const { project_id, project_name, repo_url, color, stats, epics = [], active_tasks = [], synced_at, phase = 'planning', stage = null } = status;
      const { reqs_done, reqs_total, progress_pct } = stats;

      // Calculate Epic Progress
      const epicsHtml = epics.map(e => {
        const epicPct = e.reqs_total > 0 ? Math.round((e.reqs_done / e.reqs_total) * 100) : 0;
        const barColor = e.status === 'DONE' ? 'var(--done)' : e.status === 'DOING' ? 'var(--doing)' : 'var(--muted)';
        return `
          <div class="epic-card">
            <div class="epic-header">
              <span class="epic-name">${e.id}: ${e.name}</span>
              <span class="epic-pct">${epicPct}% (${e.reqs_done}/${e.reqs_total})</span>
            </div>
            <div class="epic-progress-bar">
              <div class="epic-progress-fill" style="width:${epicPct}%;background:${barColor}"></div>
            </div>
          </div>`;
      }).join('');

      // Parse current phase & stage
      const phaseOrder = ['planning', 'design', 'implementation', 'testing'];
      const currentPhase = (phase || 'planning').toLowerCase();
      const activeIdx = phaseOrder.indexOf(currentPhase);

      // Phase step and connector styles
      const pClass = (p) => {
        const idx = phaseOrder.indexOf(p);
        if (idx < activeIdx) return 'completed';
        if (idx === activeIdx) return 'active';
        return 'todo';
      };

      const cClass = (p) => {
        const idx = phaseOrder.indexOf(p);
        if (idx <= activeIdx) return 'completed';
        return 'todo';
      };

      // Calculate phase progress percentage
      let phase_progress_pct = 0;
      if (currentPhase === 'planning') {
        phase_progress_pct = 100;
      } else if (currentPhase === 'design') {
        phase_progress_pct = 100;
      } else if (currentPhase === 'implementation') {
        phase_progress_pct = progress_pct;
      } else if (currentPhase === 'testing') {
        phase_progress_pct = 50; // Active testing
      }

      const visibleTasks = active_tasks.slice(0, 3);
      const tasksHtml = visibleTasks.length
        ? visibleTasks.map(t => `
          <div class="task-row">
            ${taskBadge(t.status)}
            <span class="task-id">${t.id}</span>
            <span class="task-title">${t.title}</span>
          </div>`).join('')
        : `<div style="font-size:0.78rem;color:var(--muted)">진행 중인 태스크 없음</div>`;

      const moreCount = active_tasks.length - visibleTasks.length;

      return `
        <div class="card" id="card-${project_id}">
          <div class="card-header">
            <div class="dot" style="background:${color}"></div>
            <h2>${project_name}</h2>
            <span class="pct">${progress_pct}%</span>
          </div>
          
          <div class="progress-bar">
            <div class="progress-fill" style="width:${progress_pct}%;background:${color}"></div>
          </div>

          <div class="card-body">
            <!-- Phase Progress Horizontal Bar -->
            <div class="phases-container">
              <div class="phases-title">Development Phase</div>
              <div class="phases-bar">
                <div class="phase-step ${pClass('planning')}">
                  <span class="phase-label">Planning</span>
                  <div class="phase-dot"></div>
                </div>
                <div class="phase-connector ${cClass('design')}"></div>
                <div class="phase-step ${pClass('design')}">
                  <span class="phase-label">Design</span>
                  <div class="phase-dot"></div>
                </div>
                <div class="phase-connector ${cClass('implementation')}"></div>
                <div class="phase-step ${pClass('implementation')}">
                  <span class="phase-label">Implementation</span>
                  <div class="phase-dot"></div>
                </div>
                <div class="phase-connector ${cClass('testing')}"></div>
                <div class="phase-step ${pClass('testing')}">
                  <span class="phase-label">Testing</span>
                  <div class="phase-dot"></div>
                </div>
              </div>

              <!-- Phase Progress Bar -->
              <div class="phase-progress-section">
                <div class="phase-progress-header">
                  <span>Phase Progress (${currentPhase.toUpperCase()}${stage ? ` - ${stage.toUpperCase()}` : ''})</span>
                  <span>${phase_progress_pct}%</span>
                </div>
                <div class="phase-progress-bar">
                  <div class="phase-progress-fill" style="width:${phase_progress_pct}%;background:${color}"></div>
                </div>
              </div>
            </div>

            <div class="epics">
              <div class="phases-title">Epic Progress</div>
              ${epicsHtml}
            </div>
            
            <div class="tasks-section">
              <div class="tasks-label">Active Tasks${active_tasks.length ? ` (${active_tasks.length})` : ''}</div>
              ${tasksHtml}
              ${moreCount > 0 ? `<div style="font-size:0.72rem;color:var(--muted);margin-top:0.3rem">+${moreCount}개 더</div>` : ''}
            </div>
          </div>
          <div class="card-footer">
            <span>동기화 ${relativeTime(synced_at)}</span>
            ${repo_url ? `<a href="${repo_url}" target="_blank">repo ↗</a>` : ''}
          </div>
        </div>`;
    }

    async function fetchJson(url) {
      const res = await fetch(url + '?t=' + Date.now());
      if (!res.ok) throw new Error(`${res.status} ${url}`);
      return res.json();
    }

    async function load() {
      const grid = document.getElementById('grid');
      try {
        const registry = await fetchJson(REGISTRY);
        if (!registry.projects || registry.projects.length === 0) {
          grid.innerHTML = '<div class="loading">등록된 프로젝트가 없습니다.</div>';
          return;
        }

        const results = await Promise.allSettled(
          registry.projects.map(p =>
            fetchJson(`projects/${p.id}/status.json`)
          )
        );

        const cards = results.map(r => {
          if (r.status === 'fulfilled') {
            return renderCard(r.value);
          }
          return `<div class="error-msg">❌ ${r.reason.message}</div>`;
        });

        grid.innerHTML = cards.join('');

        // Last updated = most recent synced_at across all projects
        const times = results
          .filter(r => r.status === 'fulfilled')
          .map(r => new Date(r.value.synced_at).getTime());
        if (times.length) {
          const latest = new Date(Math.max(...times));
          document.getElementById('last-updated').textContent =
            '마지막 동기화 ' + relativeTime(latest.toISOString());
        }
      } catch (err) {
        grid.innerHTML = `<div class="error-msg">❌ registry.json 로드 실패: ${err.message}</div>`;
      }
    }

    load();
  </script>
</body>
</html>
